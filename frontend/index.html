<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debate Engine Live</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="background-orb orb-1"></div>
  <div class="background-orb orb-2"></div>
  <main class="shell">
    <section class="hero panel">
      <div class="eyebrow">MultiMind Arena</div>
      <h1>Live debate session</h1>
      <p class="lede">Start a topic, watch the transcript stream, and inject your own message into the debate.</p>

      <div class="controls">
        <label class="field grow">
          <span>Topic</span>
          <input id="topicInput" type="text" placeholder="Should AI replace teachers?" />
        </label>

        <label class="field small">
          <span>Rounds</span>
          <input id="roundsInput" type="number" min="1" max="12" value="3" />
        </label>
      </div>

      <div class="button-row">
        <button id="startBtn" class="primary">Start debate</button>
        <button id="endDebateBtn" class="secondary" disabled>End debate</button>
      </div>
    </section>

    <section id="transcriptPanel" class="panel transcript-panel">
      <div class="panel-header">
        <h2>Live transcript</h2>
      </div>

      <div id="transcript" class="transcript"></div>
    </section>

    <section class="panel composer-panel">
      <div class="panel-header">
        <h2>Inject a user message</h2>
        <span>Optional, once a session is active</span>
      </div>

      <div class="composer">
        <input id="userMessageInput" type="text" placeholder="Challenge the room with a quick comment..." />
        <button id="sendMessageBtn" class="primary" disabled>Send</button>
      </div>
    </section>
  </main>

  <script src="/static/chat.js?v=3"></script>
</body>
</html>
